name: CI

# Validation CI for the monorepo:
#  - `validate`: Angular 21 app (app-ng) safety nets (build + unit + contract + E2E).
#  - `backend`: Spring Boot API (api/) build + tests on JDK 21 with a Postgres service.
# No deploy step yet (that is a future slice once a hosting target is chosen).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Avoid redundant runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Build & test (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app-ng/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install app-ng dependencies
        run: npm ci
        working-directory: app-ng

      - name: Build (app-ng)
        run: npm run build --prefix app-ng

      - name: Unit tests (Vitest)
        run: CI=true npm test --prefix app-ng

      - name: Contract tests (OpenAPI)
        run: npm run test:contract

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        # The Playwright config builds app-ng (pretest) and serves it on :4100.
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  backend:
    name: Backend build & test (JDK 21)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Postgres for the Spring Data JPA context (the app uses PostgreSQL).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: conduit
          POSTGRES_USER: conduit
          POSTGRES_PASSWORD: conduit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U conduit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Spring relaxed binding picks these up; the skeleton has no datasource in
      # application.properties, so we provide it here for the @SpringBootTest context.
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/conduit
      SPRING_DATASOURCE_USERNAME: conduit
      SPRING_DATASOURCE_PASSWORD: conduit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build & test (Maven)
        working-directory: api
        run: ./mvnw -B verify
