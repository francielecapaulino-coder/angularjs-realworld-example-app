# Containerized Conduit stack (slice 025-027): Angular SPA + Spring Boot API + Full LGTM Stack.
#
#   docker compose up --build      # build images and start the stack
#   open http://localhost:8080     # the app (nginx serves the SPA, proxies /api -> api)
#   open http://localhost:3000     # Grafana dashboards
#   docker compose down            # stop and remove containers
#
# The SPA calls the relative `/api` base; nginx reverse-proxies it to the `api` service.
# Full observability: Prometheus (metrics) + Loki (logs) + Tempo (traces) + Grafana (dashboards).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit -d conduit"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/conduit
      SPRING_DATASOURCE_USERNAME: conduit
      SPRING_DATASOURCE_PASSWORD: conduit
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    build:
      context: ./app-ng
    ports:
      - "8080:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - api

loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/local-config.yaml
      - -validation.allow-structured-metadata=false
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/var/loki

  tempo:
    image: grafana/tempo:latest
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command:
      - "--target=all"
      - "--storage.trace.backend=local"
      - "--storage.trace.local.path=/var/tempo"
      - "--auth-enabled=false"
      - "--search.enabled=true"
    volumes:
      - tempo-data:/var/tempo

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
      - tempo

  promtail:
    image: grafana/promtail:latest
    ports:
      - "9080:9080"
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ./api/logs:/var/log/app
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  db-data:
  grafana-data:
  tempo-data:
  loki-data: