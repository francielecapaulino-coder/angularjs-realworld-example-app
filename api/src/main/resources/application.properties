spring.application.name=conduit-backend-api

# Actuator configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# OpenTelemetry configuration
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo:4317/v1/traces
management.otlp.tracing.headers=
spring.application.name=conduit-backend-api

# Logging configuration (structured JSON)
logging.level.com.conduit=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=/app/logs/application.log

# OpenTelemetry OTLP exporter
otel.service.name=conduit-backend-api
otel.exporter.otlp.endpoint=http://tempo:4317
otel.resource.attributes=service.name=conduit-backend-api,service.version=0.0.1
