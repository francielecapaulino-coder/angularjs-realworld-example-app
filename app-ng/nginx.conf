# nginx config for the containerized Angular SPA (slice 025).
# - Serves the prebuilt browser bundle with SPA history fallback.
# - Reverse-proxies /api to the Spring Boot backend over the compose network,
#   so the app keeps calling the relative `/api` base (slice 024) unchanged.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: forward /api/* to the backend service (compose: `api`).
    # The /api prefix is preserved (the backend owns its own routing).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve static assets, falling back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
