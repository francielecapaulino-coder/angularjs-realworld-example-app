<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conduit</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!--
    Anti-FOUC theme bootstrap. Applies data-theme on <html> BEFORE the stylesheets
    load, so dark mode never flashes light on first paint. Mirrors ThemeService's
    resolution: explicit choice in localStorage ('conduit-theme'), else OS preference.
  -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('conduit-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <!-- Conduit design system (preserved from legacy src/index.html) -->
  <link href="//code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet" type="text/css">
  <link href="//fonts.googleapis.com/css?family=Titillium+Web:700|Source+Serif+Pro:400,700|Merriweather+Sans:400,700|Source+Sans+Pro:400,300,600,700,300italic,400italic,600italic,700italic" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="//demo.productionready.io/main.css">
  <!--
    Bootstrap loading state. Rendered immediately (before Angular bootstraps and
    while the APP_INITIALIZER awaits verifyAuth's GET /user) to avoid a perceptible
    white screen. Angular replaces the <app-root> content on first render, so the
    spinner disappears automatically. Styled inline so it shows without waiting for
    component CSS.
  -->
  <style>
    .app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
    }
    :root[data-theme='dark'] .app-loading {
      background: #0f1418;
    }
    .app-loading__spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(92, 184, 92, 0.25); /* Conduit green, faded */
      border-top-color: #5cb85c;                  /* Conduit green */
      border-radius: 50%;
      animation: app-loading-spin 0.8s linear infinite;
    }
    @keyframes app-loading-spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .app-loading__spinner { animation-duration: 2s; }
    }
  </style>
</head>
<body>
  <app-root>
    <div class="app-loading" role="status" aria-live="polite" aria-label="Loading">
      <div class="app-loading__spinner"></div>
    </div>
  </app-root>
</body>
</html>
