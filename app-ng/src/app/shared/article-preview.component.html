<div class="article-preview">
  <div class="article-meta">
    <a [routerLink]="['/profile', article.author.username]">
      @if (article.author.image) {
        <img [src]="article.author.image" alt="" />
      }
    </a>
    <div class="info">
      <a class="author" [routerLink]="['/profile', article.author.username]">
        {{ article.author.username }}
      </a>
      <span class="date">{{ article.createdAt | date: 'longDate' }}</span>
    </div>

    <!-- Display-only favorite count (favoriting action added in a later slice). -->
    <button class="btn btn-sm pull-xs-right"
      [class.btn-primary]="article.favorited"
      [class.btn-outline-primary]="!article.favorited"
      type="button" disabled>
      <i class="ion-heart"></i> {{ article.favoritesCount }}
    </button>
  </div>

  <a [routerLink]="['/article', article.slug]" class="preview-link">
    <h1>{{ article.title }}</h1>
    <p>{{ article.description }}</p>
    <span>Read more...</span>
    <ul class="tag-list">
      @for (tag of article.tagList; track tag) {
        <li class="tag-default tag-pill tag-outline">{{ tag }}</li>
      }
    </ul>
  </a>
</div>
